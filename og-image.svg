    </text>
    <text x="0" y="290" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="96" font-weight="800" fill="url(#brand)">
      Full-Stack Engineer
    </text>
    <text x="0" y="380" font-family="'Inter', sans-serif" font-size="32" font-weight="400" fill="#cbd5e1">
      Multi-tenant SaaS · Real-time integrations · AI pipelines
    </text>
    <text x="0" y="430" font-family="'Inter', sans-serif" font-size="32" font-weight="400" fill="#cbd5e1">
      Production-grade, not prototypes.
    </text>
  </g>

  <g transform="translate(80,530)">
    <circle cx="14" cy="14" r="8" fill="#22c55e"/>
    <text x="38" y="22" font-family="'Inter', sans-serif" font-size="26" font-weight="600" fill="#e2e8f0">
      Available for remote Senior Rails / Full-Stack roles
    </text>
  </g>

  <g transform="translate(900,530)">
    <text x="0" y="22" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#94a3b8">
